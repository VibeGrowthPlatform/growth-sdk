name: vibegrowth_sdk
description: Vibe Growth SDK for Flutter - attribution, user identity, and revenue tracking.
version: 2.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.vibegrowth.sdk.flutter
        pluginClass: VibeGrowthSdkPlugin
      ios:
        pluginClass: VibeGrowthSdkPlugin
