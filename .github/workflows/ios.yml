name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'examples/ios/**'
      - '.github/workflows/ios.yml'
    tags: ['ios/v*']
  pull_request:
    paths:
      - 'ios/**'
      - 'examples/ios/**'
      - '.github/workflows/ios.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build (SwiftPM)
        working-directory: ios
        run: swift build -v
      - name: Test (SwiftPM)
        working-directory: ios
        run: swift test -v
